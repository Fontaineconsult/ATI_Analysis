<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="Roboto, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Assets &amp; Interfaces — the inventory side of the graph</title>
  <desc id="d">ICT is modeled at three grains — Asset, Interface, Component. Stewardship (who runs it) sits on the Asset; remediation accountability (who fixes it) sits on the work. An asset stewarded with no remediating implementation is the elevation signal.</desc>

  <defs>
    <marker id="nav" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#2A3A62"/></marker>
    <marker id="cor" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#C24A43"/></marker>
    <style>
      .h1   { fill:#202C4A; font-size:24px; font-weight:700; }
      .sub  { fill:#4A5568; font-size:13px; }
      .panelT { font-size:13px; font-weight:700; letter-spacing:0.03em; }
      .boxT { font-size:15px; font-weight:700; }
      .boxS { font-size:10.5px; }
      .mono { font-family:'Courier New',monospace; font-size:10.5px; fill:#718096; }
      .rel  { fill:#4A5568; font-size:10.5px; font-style:italic; }
      .nodeT{ font-size:12.5px; font-weight:600; }
      .foot { fill:#718096; font-size:11.5px; }
    </style>
  </defs>

  <rect width="1080" height="620" fill="#ffffff"/>

  <text class="h1" x="28" y="42">Assets &amp; Interfaces</text>
  <rect x="28" y="54" width="80" height="4" rx="2" fill="#4966A4"/>
  <rect x="108" y="54" width="40" height="4" rx="2" fill="#635098"/>
  <rect x="148" y="54" width="40" height="4" rx="2" fill="#DB5850"/>
  <text class="sub" x="28" y="80">Indicators measure the <tspan font-style="italic">program</tspan>; this layer tracks the <tspan font-style="italic">things</tspan> — the ICT the institution answers for, and who is responsible for it.</text>

  <!-- ===== LEFT: three grains ===== -->
  <text class="panelT" x="40" y="118" fill="#2A3A62">THREE GRAINS OF ICT</text>

  <rect x="40" y="132" width="320" height="70" rx="10" fill="#EEF1F6" stroke="#2A3A62" stroke-width="2"/>
  <text class="boxT" x="58" y="158" fill="#2A3A62">Asset</text>
  <text class="boxS" x="58" y="176" fill="#5A6B8C">the stewarded ICT unit</text>
  <text class="mono" x="58" y="192">canvas-sfsu</text>
  <text x="344" y="172" text-anchor="end" font-size="11px" fill="#7E93BF" font-style="italic">&#8220;Canvas (SFSU)&#8221;</text>

  <rect x="70" y="252" width="320" height="70" rx="10" fill="#EEF1F6" stroke="#2A3A62" stroke-width="2"/>
  <text class="boxT" x="88" y="278" fill="#2A3A62">Interface</text>
  <text class="boxS" x="88" y="296" fill="#5A6B8C">where people meet it</text>
  <text class="mono" x="88" y="312">canvas-sfsu--course-shells--&#8230;</text>
  <text x="374" y="292" text-anchor="end" font-size="11px" fill="#7E93BF" font-style="italic">&#8220;course shells&#8221;</text>

  <rect x="100" y="372" width="320" height="70" rx="10" fill="#F5F7FA" stroke="#2A3A62" stroke-width="1.6"/>
  <text class="boxT" x="118" y="398" fill="#2A3A62">Component</text>
  <text class="boxS" x="118" y="416" fill="#5A6B8C">where WCAG criteria attach</text>
  <text class="mono" x="118" y="432">&#8230;--video-player</text>
  <text x="404" y="412" text-anchor="end" font-size="11px" fill="#7E93BF" font-style="italic">&#8220;the video player&#8221;</text>

  <!-- child -> parent arrows -->
  <path d="M250 252 L228 204" stroke="#2A3A62" stroke-width="1.8" fill="none" marker-end="url(#nav)"/>
  <text class="rel" x="236" y="232">presented_by</text>
  <path d="M280 372 L258 324" stroke="#2A3A62" stroke-width="1.8" fill="none" marker-end="url(#nav)"/>
  <text class="rel" x="266" y="352">part_of</text>

  <!-- WCAG chip -->
  <rect x="100" y="468" width="190" height="34" rx="8" fill="#F6F4FA" stroke="#635098" stroke-width="1.4"/>
  <text x="195" y="490" text-anchor="middle" class="nodeT" fill="#483A70">WCAG Guideline</text>
  <path d="M260 442 L228 466" stroke="#635098" stroke-width="1.6" fill="none" marker-end="url(#cor)"/>
  <text class="rel" x="232" y="460" fill="#635098">must_satisfy</text>

  <!-- TAAP note -->
  <rect x="40" y="528" width="400" height="58" rx="10" fill="#FCF1F0" stroke="#DB5850" stroke-width="1.4"/>
  <text x="56" y="550" font-size="12.5px" font-weight="700" fill="#A03C36">TAAP &#183; interim access</text>
  <text x="56" y="567" font-size="11px" fill="#9a4640">A time-bound plan covering an Asset when full conformance</text>
  <text x="56" y="581" font-size="11px" fill="#9a4640">isn&#8217;t yet possible &#8212; and itself counts as evidence.</text>

  <!-- ===== RIGHT TOP: stewardship ===== -->
  <rect x="470" y="100" width="580" height="150" rx="12" fill="#F4F6FB" stroke="#C9D3E8"/>
  <text class="panelT" x="488" y="124" fill="#2A3A62">STEWARDSHIP &#8212; who runs it <tspan font-weight="400" font-style="italic" fill="#5A6B8C">(on the Asset)</tspan></text>

  <rect x="490" y="146" width="120" height="48" rx="9" fill="#EEF1F6" stroke="#2A3A62" stroke-width="1.8"/>
  <text x="550" y="175" text-anchor="middle" class="nodeT" fill="#2A3A62">Asset</text>

  <rect x="876" y="140" width="156" height="60" rx="9" fill="#ffffff" stroke="#4A5568" stroke-width="1.6"/>
  <text x="954" y="166" text-anchor="middle" class="nodeT" fill="#2D3748">Person</text>
  <text x="954" y="184" text-anchor="middle" font-size="11px" fill="#718096">or  OrgUnit</text>

  <path d="M612 170 L872 170" stroke="#2A3A62" stroke-width="1.6" fill="none" marker-end="url(#nav)"/>
  <text class="rel" x="742" y="160" text-anchor="middle">procured_by &#183; developed_by</text>
  <text class="rel" x="742" y="186" text-anchor="middle">maintained_by &#183; used_by</text>

  <rect x="490" y="206" width="120" height="34" rx="8" fill="#F7FAFC" stroke="#718096" stroke-width="1.3"/>
  <text x="550" y="228" text-anchor="middle" font-size="11.5px" fill="#4A5568">Vendor</text>
  <path d="M550 206 L550 196" stroke="#718096" stroke-width="1.5" fill="none" marker-end="url(#nav)"/>
  <text class="rel" x="618" y="226">supplied_by &#183; commercial provenance, not stewardship</text>

  <!-- ===== RIGHT MIDDLE: remediation ===== -->
  <rect x="470" y="266" width="580" height="190" rx="12" fill="#FCF1F0" stroke="#F2BDB9"/>
  <text class="panelT" x="488" y="290" fill="#A03C36">REMEDIATION &#8212; who fixes it <tspan font-weight="400" font-style="italic" fill="#9a4640">(on the work)</tspan></text>

  <rect x="488" y="312" width="160" height="60" rx="9" fill="#ffffff" stroke="#DB5850" stroke-width="1.8"/>
  <text x="568" y="338" text-anchor="middle" class="nodeT" fill="#A03C36">Implementation</text>
  <text x="568" y="356" text-anchor="middle" font-size="10px" fill="#9a4640">Process / Project / Procedure / Service</text>

  <g>
    <rect x="840" y="300" width="190" height="30" rx="7" fill="#EEF1F6" stroke="#2A3A62" stroke-width="1.3"/><text x="935" y="320" text-anchor="middle" font-size="11.5px" fill="#2A3A62">Interface</text>
    <rect x="840" y="338" width="190" height="30" rx="7" fill="#ffffff" stroke="#718096" stroke-width="1.3"/><text x="935" y="358" text-anchor="middle" font-size="11.5px" fill="#4A5568">Tool</text>
    <rect x="840" y="376" width="190" height="30" rx="7" fill="#ffffff" stroke="#4A5568" stroke-width="1.3"/><text x="935" y="396" text-anchor="middle" font-size="11.5px" fill="#2D3748">Person</text>
    <rect x="840" y="414" width="190" height="30" rx="7" fill="#F2F2F3" stroke="#4A5568" stroke-width="1.3"/><text x="935" y="434" text-anchor="middle" font-size="11.5px" fill="#4A5568">ATI Working Group</text>
  </g>

  <path d="M648 330 L836 315" stroke="#C24A43" stroke-width="1.5" fill="none" marker-end="url(#cor)"/><text class="rel" x="690" y="316" fill="#A03C36">remediates_interface</text>
  <path d="M648 344 L836 353" stroke="#C24A43" stroke-width="1.5" fill="none" marker-end="url(#cor)"/><text class="rel" x="724" y="343" fill="#A03C36">uses_tool</text>
  <path d="M648 358 L836 391" stroke="#C24A43" stroke-width="1.5" fill="none" marker-end="url(#cor)"/><text class="rel" x="712" y="378" fill="#A03C36">owned_by</text>
  <path d="M648 366 L836 429" stroke="#C24A43" stroke-width="1.5" fill="none" marker-end="url(#cor)"/><text class="rel" x="690" y="420" fill="#A03C36">accountable_working_group</text>

  <!-- ===== elevation banner ===== -->
  <rect x="470" y="470" width="580" height="116" rx="12" fill="#FFF8EC" stroke="#ED8936" stroke-width="1.6"/>
  <text x="492" y="498" font-size="14px" font-weight="700" fill="#9C4221">&#9888;  The elevation signal</text>
  <text x="492" y="522" font-size="12px" fill="#7B4A1E">An Asset that is <tspan font-weight="700">stewarded</tspan> (someone runs it) but has <tspan font-weight="700">no remediating implementation</tspan></text>
  <text x="492" y="540" font-size="12px" fill="#7B4A1E">(nobody positioned to fix it) is exactly where responsibility <tspan font-weight="700">rises to the institution</tspan>.</text>
  <text x="492" y="564" font-size="11px" fill="#9C7B4A" font-style="italic">Title II &#167;35.205 &#183; the model makes the rise visible instead of letting it hide.</text>

  <text class="foot" x="28" y="610">Stewardship on the Asset, remediation accountability on the work: the graph distinguishes &#8220;someone runs this&#8221; from &#8220;someone is fixing this,&#8221; and reports each honestly.</text>
</svg>
