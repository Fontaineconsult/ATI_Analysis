<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="Roboto, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">The maturity ladder</title>
  <desc id="d">Status is a six-rung capability-maturity ladder from Not Started to Optimizing, rendered as an ascending red-to-green staircase. Established is the baseline target.</desc>

  <defs>
    <marker id="up" markerWidth="12" markerHeight="12" refX="6" refY="2" orient="auto"><path d="M1,10 L6,2 L11,10" fill="none" stroke="#246f24" stroke-width="2.2"/></marker>
    <style>
      .h1   { fill:#202C4A; font-size:24px; font-weight:700; }
      .sub  { fill:#4A5568; font-size:13px; }
      .name { font-size:14px; font-weight:700; }
      .lvl  { fill:#718096; font-size:11px; }
      .num  { font-size:30px; font-weight:800; }
      .desc { fill:#4A5568; font-size:11.5px; }
      .foot { fill:#718096; font-size:12px; }
    </style>
  </defs>

  <rect width="980" height="540" fill="#ffffff"/>

  <text class="h1" x="28" y="44">The maturity ladder</text>
  <rect x="28" y="56" width="80" height="4" rx="2" fill="#4966A4"/>
  <rect x="108" y="56" width="40" height="4" rx="2" fill="#635098"/>
  <rect x="148" y="56" width="40" height="4" rx="2" fill="#DB5850"/>
  <text class="sub" x="28" y="82">Status is a position on a journey, not a done / not-done flag. Each rung is claimed only when its requirements are met &#8212; and per Chancellor&#8217;s Office direction, set conservatively.</text>

  <!-- baseline -->
  <line x1="40" y1="440" x2="940" y2="440" stroke="#CBD5E0" stroke-width="1.5"/>

  <!-- target line at Established -->
  <line x1="490" y1="236" x2="940" y2="236" stroke="#2F855A" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="936" y="228" text-anchor="end" font-size="11.5px" fill="#2F855A" font-weight="600">baseline maturity target</text>

  <!-- step 0 Not Started -->
  <rect x="40" y="380" width="142" height="60" fill="#E53E3E"/>
  <text class="num" x="111" y="418" text-anchor="middle" fill="#ffffff">0</text>
  <text class="name" x="111" y="360" text-anchor="middle" fill="#9B2C2C">Not Started</text>
  <text class="lvl"  x="111" y="374" text-anchor="middle">level 0</text>
  <text class="desc" x="111" y="462" text-anchor="middle">no activity yet</text>

  <!-- step 1 Initiated -->
  <rect x="190" y="332" width="142" height="108" fill="#ED8936"/>
  <text class="num" x="261" y="372" text-anchor="middle" fill="#ffffff">1</text>
  <text class="name" x="261" y="312" text-anchor="middle" fill="#9C4221">Initiated</text>
  <text class="lvl"  x="261" y="326" text-anchor="middle">level 1</text>
  <text class="desc" x="261" y="462" text-anchor="middle">ad hoc, first efforts</text>

  <!-- step 2 Defined -->
  <rect x="340" y="284" width="142" height="156" fill="#ECC94B"/>
  <text class="num" x="411" y="324" text-anchor="middle" fill="#5F4B12">2</text>
  <text class="name" x="411" y="264" text-anchor="middle" fill="#8a6d12">Defined</text>
  <text class="lvl"  x="411" y="278" text-anchor="middle">level 2</text>
  <text class="desc" x="411" y="462" text-anchor="middle">documented &amp; repeatable</text>

  <!-- step 3 Established (target) -->
  <rect x="490" y="236" width="142" height="204" fill="#41b441"/>
  <text class="num" x="561" y="276" text-anchor="middle" fill="#ffffff">3</text>
  <text class="name" x="561" y="216" text-anchor="middle" fill="#256d25">Established</text>
  <text class="lvl"  x="561" y="230" text-anchor="middle">level 3</text>
  <text class="desc" x="561" y="462" text-anchor="middle" font-weight="700" fill="#256d25">in place across the area</text>

  <!-- step 4 Managed -->
  <rect x="640" y="188" width="142" height="252" fill="#246f24"/>
  <text class="num" x="711" y="228" text-anchor="middle" fill="#ffffff">4</text>
  <text class="name" x="711" y="168" text-anchor="middle" fill="#1c531c">Managed</text>
  <text class="lvl"  x="711" y="182" text-anchor="middle">level 4</text>
  <text class="desc" x="711" y="462" text-anchor="middle">measured &amp; controlled</text>

  <!-- step 5 Optimizing -->
  <rect x="790" y="140" width="142" height="300" fill="#157744"/>
  <text class="num" x="861" y="180" text-anchor="middle" fill="#ffffff">5</text>
  <text class="name" x="861" y="120" text-anchor="middle" fill="#105732">Optimizing</text>
  <text class="lvl"  x="861" y="134" text-anchor="middle">level 5</text>
  <text class="desc" x="861" y="462" text-anchor="middle">continuously improving</text>

  <!-- progression arrow -->
  <path d="M120 470 C 360 500, 640 500, 880 130" fill="none" stroke="#246f24" stroke-width="2" stroke-opacity="0.5" marker-end="url(#up)"/>

  <text class="foot" x="28" y="512">The honest question is never &#8220;did we do something?&#8221; but &#8220;is this a <tspan font-style="italic">defined, managed, improving</tspan> capability?&#8221; Every rung requires evidence; reviewers lower statuses that overreach.</text>
</svg>
