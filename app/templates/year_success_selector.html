
<label for="year_success_evidence"></label>
<select id="year_success_evidence" name="year_success_evidence"
        hx-trigger="change from:body"
        hx-get="/your-endpoint"
        hx-swap="innerHTML"
        hx-target="#success-indicator-evidence">
    {% for item in year_success_evidence %}
    <option value="{{ item.year_success_evidence }}" data-success-indicator="{{ item.academic_year }}/{{ item.composite_key.split('-')[0] }}/{{ item.composite_key.split('-')[1] }}">
        {{ item.year_success_evidence }} - {{ item.success_indicator }}
    </option>
    {% endfor %}
</select>
