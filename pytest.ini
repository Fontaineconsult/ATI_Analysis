[pytest]
# Add the project root to sys.path so `from app import ...` resolves when
# pytest is invoked from a plain shell (PyCharm adds content roots
# automatically; bare `pytest` does not).
pythonpath = .

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers — declare so pytest doesn't warn on first use.
#   unit:        pure unit tests, no external dependencies
#   integration: hits Neo4j (live DB or test DB, see tests/conftest.py)
#   api:         exercises Flask endpoints via the test client
markers =
    unit: pure unit tests; no external dependencies
    integration: requires a configured Neo4j connection
    api: exercises Flask endpoints via the test client

# Show short tracebacks by default, fail loudly on warnings, capture print().
addopts = --tb=short --strict-markers
